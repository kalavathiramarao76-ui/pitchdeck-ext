<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="bg-sheen" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="exhaust" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="slide-clip">
      <rect x="28" y="62" width="72" height="44" rx="5"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#bg-sheen)"/>

  <!-- Slide/screen at bottom -->
  <g filter="url(#shadow)">
    <rect x="28" y="62" width="72" height="44" rx="5" fill="#ffffff" opacity="0.18"/>
    <rect x="28" y="62" width="72" height="44" rx="5" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Faint content inside slide -->
  <g clip-path="url(#slide-clip)" opacity="0.25">
    <rect x="36" y="88" width="6" height="12" rx="1" fill="#ffffff"/>
    <rect x="45" y="82" width="6" height="18" rx="1" fill="#ffffff"/>
    <rect x="54" y="76" width="6" height="24" rx="1" fill="#ffffff"/>
    <rect x="68" y="78" width="24" height="2.5" rx="1" fill="#ffffff"/>
    <rect x="68" y="84" width="20" height="2.5" rx="1" fill="#ffffff"/>
    <rect x="68" y="90" width="22" height="2.5" rx="1" fill="#ffffff"/>
    <rect x="36" y="68" width="30" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Exhaust flames inside slide -->
  <g clip-path="url(#slide-clip)" filter="url(#glow)">
    <path d="M64 62 Q58 75 56 82 Q62 76 64 82 Q66 76 72 82 Q70 75 64 62" fill="url(#exhaust)" opacity="0.7"/>
    <path d="M64 62 Q60 70 59 76 Q63 72 64 76 Q65 72 69 76 Q68 70 64 62" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Rocket ship -->
  <g filter="url(#shadow)">
    <path d="M64 14 Q56 28 54 46 L54 60 Q54 62 56 62 L72 62 Q74 62 74 60 L74 46 Q72 28 64 14 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M64 14 Q60 24 58 38 L64 36 Z" fill="#ffffff" opacity="0.2"/>
    <circle cx="64" cy="42" r="5" fill="#d97706" opacity="0.6"/>
    <circle cx="64" cy="42" r="3.5" fill="#92400e" opacity="0.4"/>
    <circle cx="62.5" cy="40.5" r="1.2" fill="#ffffff" opacity="0.5"/>
    <path d="M54 50 L44 62 L54 60 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M74 50 L84 62 L74 60 Z" fill="#ffffff" opacity="0.8"/>
    <rect x="56" y="52" width="16" height="2.5" rx="1" fill="#d97706" opacity="0.3"/>
  </g>

  <!-- Speed lines -->
  <g stroke="#ffffff" stroke-linecap="round" opacity="0.3">
    <line x1="44" y1="36" x2="36" y2="42" stroke-width="1.5"/>
    <line x1="42" y1="46" x2="32" y2="50" stroke-width="1.2"/>
    <line x1="84" y1="36" x2="92" y2="42" stroke-width="1.5"/>
    <line x1="86" y1="46" x2="96" y2="50" stroke-width="1.2"/>
  </g>

  <!-- Stars around rocket -->
  <g fill="#ffffff" filter="url(#glow)">
    <path d="M30 24 L31 27 L30 30 L29 27 Z" opacity="0.6"/>
    <path d="M30 24 L33 25 L30 27 L27 25 Z" opacity="0.6"/>
    <path d="M98 20 L99 22.5 L98 25 L97 22.5 Z" opacity="0.5"/>
    <path d="M98 20 L100.5 21 L98 22.5 L95.5 21 Z" opacity="0.5"/>
    <path d="M22 50 L22.8 52 L22 54 L21.2 52 Z" opacity="0.4"/>
    <path d="M22 50 L24 50.8 L22 52 L20 50.8 Z" opacity="0.4"/>
    <path d="M106 44 L106.8 46 L106 48 L105.2 46 Z" opacity="0.45"/>
    <path d="M106 44 L108 44.8 L106 46 L104 44.8 Z" opacity="0.45"/>
    <circle cx="36" cy="16" r="1" opacity="0.35"/>
    <circle cx="90" cy="14" r="0.8" opacity="0.3"/>
    <circle cx="108" cy="32" r="1.2" opacity="0.3"/>
  </g>
</svg>