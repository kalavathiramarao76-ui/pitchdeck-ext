<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Presentation screen -->
  <g fill="none" stroke="white" stroke-width="3.5">
    <rect x="22" y="34" width="64" height="48" rx="4" fill="white" fill-opacity="0.15"/>
    <!-- Screen stand -->
    <line x1="54" y1="82" x2="54" y2="96"/>
    <line x1="40" y1="96" x2="68" y2="96"/>
    <!-- Chart bars inside screen -->
    <rect x="32" y="62" width="8" height="14" rx="1.5" fill="white" opacity="0.6" stroke="none"/>
    <rect x="44" y="54" width="8" height="22" rx="1.5" fill="white" opacity="0.7" stroke="none"/>
    <rect x="56" y="46" width="8" height="30" rx="1.5" fill="white" opacity="0.8" stroke="none"/>
    <rect x="68" y="52" width="8" height="24" rx="1.5" fill="white" opacity="0.7" stroke="none"/>
  </g>
  <!-- Rocket -->
  <g fill="white" transform="translate(76, 16)">
    <!-- Rocket body -->
    <path d="M16,36 L20,36 L22,28 C22,18 20,8 18,4 C16,8 14,18 14,28 Z"/>
    <!-- Nose cone -->
    <ellipse cx="18" cy="4" rx="3" ry="4" opacity="0.9"/>
    <!-- Left fin -->
    <path d="M14,28 L10,34 L14,32 Z" opacity="0.8"/>
    <!-- Right fin -->
    <path d="M22,28 L26,34 L22,32 Z" opacity="0.8"/>
    <!-- Flame -->
    <path d="M16,36 L18,44 L20,36" fill="white" opacity="0.6"/>
  </g>
</svg>